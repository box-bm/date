name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; no cancela el que esté en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el sitio (carpeta raíz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
